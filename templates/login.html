<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 재고 입력</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: "Malgun Gothic", sans-serif; font-size: 14px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; padding: 32px 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); width: 100%; max-width: 320px; }
    h1 { margin: 0 0 24px; font-size: 18px; color: #1e293b; text-align: center; }
    label { display: block; margin-bottom: 6px; color: #475569; font-weight: 500; }
    input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; }
    button { width: 100%; margin-top: 16px; padding: 10px; border: none; border-radius: 6px; background: #2563eb; color: #fff; font-size: 14px; font-family: inherit; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="box">
    <h1>재고 입력 서비스</h1>
    <form method="post" action="{{ url_for('login') }}">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" placeholder="비밀번호 입력" required autofocus />
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit">입장</button>
    </form>
  </div>
</body>
</html>
